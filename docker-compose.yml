services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-allinpart}
      POSTGRES_USER: ${POSTGRES_USER:-allinpart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: Allin_Part.setting.prod
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DATABASE_URL: postgres://${POSTGRES_USER:-allinpart}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-allinpart}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-allinpart.com,www.allinpart.com}
      # Must match django_site.id (Sites in DB). Restore/migrations may omit pk=1; set explicitly if admin returns 500.
      SITE_ID: ${SITE_ID:-1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://allinpart.com,https://www.allinpart.com}
      DEBUG: ${DEBUG:-false}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-true}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
      BEHIND_REVERSE_PROXY: "true"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
